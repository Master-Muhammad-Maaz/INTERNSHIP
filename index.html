<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Professional Certificate with Watermark</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .admin-controls { background: #fff; padding: 20px; border-radius: 12px; width: 800px; margin-bottom: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input, select { padding: 10px; border: 1px solid #ccc; border-radius: 6px; }
        button { grid-column: span 2; padding: 12px; background: #1a1a40; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }

        /* Certificate Container */
        #cert-container { 
            width: 794px; height: 1123px; background: white; padding: 50px; 
            box-sizing: border-box; position: relative; border: 15px solid #1a1a40; 
            display: flex; flex-direction: column; overflow: hidden; 
        }

        /* WATERMARK STYLING */
        .watermark {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%) rotate(-45deg);
            font-size: 80px; font-weight: bold; color: rgba(26, 26, 64, 0.05); /* Bahut halka color */
            white-space: nowrap; pointer-events: none; z-index: 0;
            text-transform: uppercase;
        }

        .header { background: #1a1a40; color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; border-radius: 5px; z-index: 1; }
        .student-name { font-size: 45px; font-weight: bold; color: #1a1a40; margin: 30px 0; border-bottom: 2px solid #eee; display: inline-block; width: 90%; text-align: center; z-index: 1; }
        
        .detail-row { border: 1px solid #eef1f6; border-radius: 15px; padding: 12px 20px; margin: 10px 0; border-left: 8px solid #1a1a40; text-align: left; background: white; z-index: 1; position: relative; }
        .detail-row label { display: block; font-size: 10px; color: #888; text-transform: uppercase; font-weight: bold; }
        .detail-row span { font-size: 18px; font-weight: 600; }

        .footer { margin-top: auto; display: flex; justify-content: space-between; align-items: flex-end; padding-bottom: 20px; z-index: 1; }
        .sign-font { font-family: 'Brush Script MT', cursive; font-size: 35px; margin: 0; transform: rotate(-3deg); }
        .seal-box { width: 120px; height: 120px; border: 4px double #0056b3; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #0056b3; font-weight: bold; transform: rotate(-5deg); text-align: center; font-size: 9px; background: white; }
    </style>
</head>
<body>

    <div class="admin-controls">
        <input type="text" id="inOrg" placeholder="Organization Name (Watermark)" oninput="update()">
        <input type="text" id="inName" placeholder="Student Name" oninput="update()">
        <input type="text" id="inID" placeholder="Certificate ID" oninput="update()">
        <select id="inDur" onchange="update()">
            <option value="1 Month">1 Month</option>
            <option value="3 Months">3 Months</option>
            <option value="150 Hours">150 Hours</option>
        </select>
        <button onclick="downloadHD()">Download HD Certificate</button>
    </div>

    <div id="cert-container">
        <div class="watermark" id="outWatermark">ORGANIZATION</div>

        <div class="header">
            <div>
                <h2 style="margin:0; letter-spacing: 1px;" id="outOrgHeader">ORGANIZATION NAME</h2>
                <small>SOFTWARE DEVELOPMENT & IT SOLUTIONS</small>
            </div>
            <div style="background:white; color:#1a1a40; padding:10px; font-weight:bold; border-radius:5px;">C</div>
        </div>

        <div style="text-align: center; margin-top: 40px; z-index: 1;">
            <p style="letter-spacing: 3px; font-weight: bold; color: #1a1a40;">INTERNSHIP COMPLETION CERTIFICATE</p>
            <p>This is to certify that</p>
            <div class="student-name" id="outName">Student Name</div>
            <p>has successfully completed internship with <b>Codematrix</b>.</p>
        </div>

        <div style="margin-top: 30px; z-index: 1;">
            <div class="detail-row"><label>Duration</label><span id="outDur">1 Month</span></div>
            <div class="detail-row"><label>Certificate ID</label><span id="outID">WRI06042622</span></div>
            <div class="detail-row"><label>Performance</label><span>Excellent</span></div>
        </div>

        <div class="footer">
            <div class="sign-area">
                <p class="sign-font">Sample Signature</p>
                <div style="border-top: 2px solid #333; width: 200px; padding-top: 5px;">
                    <b>Authorized Signatory</b>
                </div>
            </div>
            <div class="seal-box">
                <span>MSME</span>
                <hr style="width: 80%; border: 0.5px solid #0056b3;">
                <span>REGISTERED</span>
            </div>
        </div>
    </div>

    <script>
        function update() {
            const org = document.getElementById('inOrg').value || "ORGANIZATION";
            document.getElementById('outWatermark').innerText = org;
            document.getElementById('outOrgHeader').innerText = org;
            document.getElementById('outName').innerText = document.getElementById('inName').value || "Student Name";
            document.getElementById('outID').innerText = document.getElementById('inID').value || "WRI06042622";
            document.getElementById('outDur').innerText = document.getElementById('inDur').value;
        }

        function downloadHD() {
            const element = document.getElementById('cert-container');
            const opt = {
                margin:       0,
                filename:     'Certificate_Watermarked.pdf',
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, logging: false, useCORS: true },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
        }
    </script>
</body>
</html>
