<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Internship Certificate - Codematrix</title>
    <style>
        /* Base Styling */
        body {
            font-family: 'Times New Roman', Times, serif; /* Professional Serif Font */
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding-top: 30px;
        }

        /* Color Scheme Variables */
        :root {
            --primary-color: #1a1a40; /* Very Dark Purple/IndiGo */
            --accent-color: #ffd700; /* Gold for subtle accents */
            --text-color: #2c2c2c;
            --student-name-color: #0d0d26;
        }

        /* Form Styling (Not shown in print) */
        .no-print {
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            width: 800px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .form-group { margin-bottom: 10px; display: flex; align-items: center; }
        .form-group label { width: 150px; font-weight: bold; color: var(--primary-color); }
        .form-group input { flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 5px; }

        /* Certificate Container */
        .certificate-container {
            background-color: white;
            width: 850px;
            height: 1100px; /* A4 Portrait Ratio */
            padding: 80px 60px;
            border: 2px solid var(--primary-color); /* Dark Purple Border */
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Watermark (Representative of image_3) */
        .watermark {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-15deg);
            opacity: 0.05;
            font-family: sans-serif;
            border: 2px solid var(--primary-color);
            border-radius: 50%;
            padding: 30px;
            text-align: center;
            width: 250px; height: 250px;
        }

        /* Header Section */
        .header {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 50px;
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 20px;
        }
        .logo-placeholder {
            width: 60px; height: 60px;
            background-color: var(--primary-color);
            color: #fff; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            border-radius: 10px;
            margin-right: 20px;
            font-size: 24px;
        }
        .company-info h1 {
            color: var(--primary-color);
            margin: 0;
            font-size: 28px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .company-info p {
            margin: 0;
            font-size: 12px;
            color: #555;
            letter-spacing: 3px;
        }

        /* Title */
        .cert-title {
            letter-spacing: 4px;
            font-size: 16px;
            color: var(--primary-color);
            margin-bottom: 40px;
            text-align: center;
        }

        /* Main Content with dynamic text insertion */
        .content {
            text-align: center;
            margin-top: 20px;
        }
        .student-name {
            font-size: 56px;
            font-weight: bold;
            margin: 15px 0;
            color: var(--student-name-color);
            display: inline-block;
            border-bottom: 1px solid #ddd;
        }
        .internship-role {
            font-weight: 600;
            color: var(--primary-color);
        }

        /* Dynamic Detail Blocks */
        .details-container {
            margin-top: 60px;
            text-align: left;
        }
        .detail-item {
            border: 1px solid #eef2f6;
            border-radius: 18px;
            padding: 15px 30px;
            margin-bottom: 15px;
            background-color: #fff;
            border-left: 5px solid var(--primary-color); /* Professional left border */
        }
        .detail-item label {
            display: block;
            font-size: 11px;
            color: #888;
            margin-bottom: 5px;
            text-transform: uppercase;
        }
        .detail-item span {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-color);
        }
